<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 24px; color: #1b2b4d; }
    h1 { margin-bottom: 6px; }
    label { display: block; font-size: 12px; font-weight: 800; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    input { width: 100%; padding: 12px; border: 1px solid #dbe5f4; border-radius: 10px; box-sizing: border-box; }
    button { margin-top: 20px; padding: 12px 24px; background: #0a66ff; color: #fff; border: none; border-radius: 999px; font-weight: 800; cursor: pointer; }
    p { font-size: 13px; color: #5d6a7d; line-height: 1.6; }
    .hint { padding: 12px; background: #f7faff; border: 1px solid #dbe5f4; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Simplifi Extension Settings</h1>
  <p class="hint">Use /extension/connect while signed in to pair automatically. Manual settings are only for testing or alternate environments.</p>

  <label>API Base URL</label>
  <input id="apiUrl" placeholder="https://ea-payments.vercel.app" />

  <label>Capture API Key</label>
  <input id="apiKey" type="password" placeholder="Paired by /extension/connect" />

  <label>Notify email</label>
  <input id="notifyEmail" type="email" placeholder="you@company.com" />

  <label>Portal slug</label>
  <input id="portalSlug" placeholder="demo-client" />

  <button id="save">Save Settings</button>
  <p id="msg"></p>

  <script src="options.js"></script>
</body>
</html>
