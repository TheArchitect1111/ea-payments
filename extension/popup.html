<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      background: #f7faff;
      color: #1b2b4d;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .brand { color: #0a66ff; font-size: 11px; font-weight: 950; letter-spacing: 0.24em; text-transform: uppercase; }
    h1 { margin: 6px 0 6px; font-size: 20px; line-height: 1.15; }
    p { margin: 0 0 12px; color: #5d6a7d; font-size: 12px; line-height: 1.45; }
    .status { display: flex; gap: 8px; margin-bottom: 12px; }
    .pill { border-radius: 999px; background: #fff; border: 1px solid #dbe5f4; padding: 6px 9px; color: #1b2b4d; font-size: 11px; font-weight: 800; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button, a.action {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid #dbe5f4;
      background: #fff;
      color: #1b2b4d;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
    }
    .primary { background: #0a66ff; border-color: #0a66ff; color: #fff; }
    .gold { background: #c9a844; border-color: #c9a844; color: #1b2b4d; }
    #status { min-height: 16px; margin-top: 10px; color: #5d6a7d; font-size: 12px; }
    #brief, #recent { margin-top: 12px; padding: 12px; border-radius: 12px; background: #fff; border: 1px solid #dbe5f4; font-size: 12px; color: #5d6a7d; line-height: 1.45; }
    .footer { display: flex; justify-content: space-between; margin-top: 12px; }
    .footer a { color: #0a66ff; font-size: 11px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="brand">Simplifi Extension</div>
  <h1>Personal Opportunity Intelligence</h1>
  <p>Capture, watch, follow up, and keep browsing. Simplifi will notify you when a story or action is ready.</p>
  <div class="status">
    <span class="pill" id="watch-count">0 watched</span>
    <span class="pill" id="recent-count">0 captures</span>
  </div>
  <div class="grid">
    <button id="capture" class="primary">Capture Page</button>
    <button id="watch">Watch This</button>
    <button id="analyze">Analyze</button>
    <button id="followup">Follow Up</button>
    <button id="brief" class="gold">Daily Brief</button>
    <a id="dashboard" class="action" href="https://ea-payments.vercel.app/simplifi/workspace" target="_blank">Today's Brief</a>
  </div>
  <div id="recent">Recent opportunities will appear here.</div>
  <div id="status"></div>
  <div class="footer">
    <a href="#" id="options">Settings</a>
    <a href="https://ea-payments.vercel.app/extension/connect" target="_blank">Connect</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
