<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      color-scheme: light;
      --ink: #18243c;
      --muted: #66758a;
      --line: #dce6f2;
      --blue: #0a66ff;
      --gold: #c9a844;
      --wash: #f7faff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 18px;
      background: var(--wash);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .orb {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.9), transparent 22%),
        radial-gradient(circle at 68% 72%, rgba(201, 168, 68, 0.7), transparent 28%),
        linear-gradient(140deg, #2d7dff, #082765 66%, #151a2c);
      box-shadow: 0 16px 42px rgba(8, 39, 101, 0.28);
      flex: 0 0 auto;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
    }

    .lede {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      min-height: 62px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .stat strong {
      display: block;
      font-size: 18px;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    button, a {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .brief {
      display: grid;
      gap: 8px;
    }

    .card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .card strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      line-height: 1.25;
    }

    .card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .card a {
      min-height: auto;
      justify-content: flex-start;
      border: 0;
      padding: 8px 0 0;
      color: var(--blue);
      font-size: 12px;
      background: transparent;
    }

    .status {
      min-height: 18px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">Simplifi</p>
      <h1>Smart Brief</h1>
    </div>
    <span class="orb" aria-hidden="true"></span>
  </header>

  <p id="greeting" class="lede">Loading the latest guidance...</p>

  <section class="stats" aria-label="Brief counts">
    <div class="stat"><strong id="active-count">0</strong><span>Active</span></div>
    <div class="stat"><strong id="attention-count">0</strong><span>Attention</span></div>
    <div class="stat"><strong id="watch-count">0</strong><span>Watch</span></div>
  </section>

  <section class="actions" aria-label="Quick actions">
    <button id="capture" class="primary" type="button">Capture Page</button>
    <button id="watch" type="button">Watch This</button>
    <button id="refresh" type="button">Refresh Brief</button>
    <a id="workspace" href="https://ea-payments.vercel.app/simplifi/workspace" target="_blank">Workspace</a>
  </section>

  <section id="brief" class="brief" aria-label="Smart Brief cards"></section>
  <div id="status" class="status"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
